[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
cache_path = "cache"
solc_version = "0.8.26"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
ffi = false
remappings = [
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/"
]

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
